<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111726"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="480" rx="72" fill="url(#bg)"/>
  <!-- shield -->
  <path d="M240 96 L360 140 V244 Q360 332 240 384 Q120 332 120 244 V140 Z"
        fill="none" stroke="url(#shield)" stroke-width="14" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- checkmark inside -->
  <path d="M192 244 L228 280 L300 196" fill="none" stroke="url(#shield)" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- subtle grid dots -->
  <g fill="#5b8def" opacity="0.12">
    <circle cx="60" cy="60" r="2"/><circle cx="84" cy="60" r="2"/><circle cx="60" cy="84" r="2"/>
    <circle cx="420" cy="420" r="2"/><circle cx="396" cy="420" r="2"/><circle cx="420" cy="396" r="2"/>
  </g>
</svg>
